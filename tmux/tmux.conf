# First things first:  Remap the prefix key to reduce conflicts with Emacs!
# unbind C-b

# By default, we'll use Control-backslash as the prefix key.
# set -g prefix 'C-\'
# bind 'C-\' send-prefix

# reload config file with f5
bind f5 source-file ~/.tmux.conf

# Make splits using | and _ using the current directory
bind _ split-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Enable mouse support (scrollback, pane selection, resizing)
set -g mouse on

# zsh is kinda tight
# set-option -g default-shell $SHELL
set-option -g default-shell /bin/zsh


# copy and paster
# mac only
# set-option -g default-command "reattach-to-user-namespace -l zsh"

# look good
# set -g default-terminal "screen-256color"
# Use 256 colors
# set -g default-terminal "screen-256color"
# set -g default-terminal "xterm-256color"
# set -g default-terminal "xterm"

# act like vim
# setw -g mode-keys vi
# bind h select-pane -L
# bind j select-pane -D
# bind k select-pane -U
# bind l select-pane -R
# bind-key -r C-h select-window -t :-
# bind-key -r C-l select-window -t :+
# unbind [
# bind ` copy-mode
# unbind p
# bind p paste-buffer
# bind -t vi-copy v begin-selection
# bind -t vi-copy y copy-selection

# Highlight currently-active pane
set-option -g pane-border-style bg=black,fg=white
set-option -g pane-active-border-style bg=black,fg=blue

# after copying to a tmux buffer, hit y again to copy to clipboard
bind y run "tmux save-buffer - | reattach-to-user-namespace pbcopy"

#### COLOUR (Solarized 256)

# default statusbar colors
set-option -g status-style bg=colour235,fg=colour136 #base02, yellow

# default window title colors
set-window-option -g window-status-style fg=colour244 #base0
#set-window-option -g window-status-attr dim

# active window title colors
set-window-option -g window-status-current-style fg=colour166 #orange
#set-window-option -g window-status-current-attr bright

# pane border
set-option -g pane-border-style fg=colour235 #base02
set-option -g pane-active-border-style fg=colour240 #base01

# message text
set-option -g message-style bg=colour235,fg=colour166 #base02, orange

# pane number display
set-option -g display-panes-active-colour colour33 #blue
set-option -g display-panes-colour colour166 #orange

# clock
set-window-option -g clock-mode-colour colour64 #green

set -s escape-time 0

# unbind C-b
# set -g prefix C-Space
# bind C-Space send-prefix

# Terminal settings for Claude Code compatibility
set -g default-terminal "tmux-256color"

# True color support
set -as terminal-overrides ',xterm*:Tc'

# Extended keys for Shift+Enter support in Claude Code (tmux 3.2+)
set -s extended-keys always
set -s extended-keys-format csi-u
set -as terminal-features ',xterm-256color:extkeys'

# Scrollback buffer (default is 2000, which is too small for Claude output)
set -g history-limit 50000

# Allow programs to set clipboard via OSC 52 (needed for copy in tmux)
set -g set-clipboard on

# Pass through application escape sequences (iTerm2 integration)
set -g allow-passthrough on

# ---- Plugins (TPM) ----

# Auto-install TPM on a fresh machine so the first `tmux` after install.sh works.
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Save pane scrollback so we can scroll up past the resume picker and see
# what each pane was doing before the restart -- the disambiguator for
# multiple claudes in the same folder (e.g. coder vs. planner).
set -g @resurrect-capture-pane-contents 'on'

# Restart `claude` panes into `claude --resume` so we get the per-folder
# session picker on restore instead of a fresh empty session.
set -g @resurrect-processes '"claude->claude --resume"'

# Continuum: auto-save every 15 min, auto-restore on tmux server start.
set -g @continuum-restore 'on'

# FUTURE WORK: per-pane Claude session restore (no picker)
# --------------------------------------------------------
# When N claudes run in the same folder, each restored pane shows the same
# picker (it's scoped by cwd, not by pane). To restore each pane to its
# exact prior session, add a pre-save hook that snapshots the active
# session UUID into a tmux pane user-option:
#
#   set -g @resurrect-hook-pre-save-all '~/.tmux/scripts/snapshot-claude-sessions.sh'
#
# The hook iterates panes running `claude`, finds the most-recently-touched
# ~/.claude/projects/<encoded-cwd>/<uuid>.jsonl, and sets @claude-session-id
# on that pane. Then change @resurrect-processes to call a wrapper that
# reads @claude-session-id and runs `claude --resume <uuid>` directly.
# ~40 lines of shell across two scripts. Revisit if the picker gets old.

# Initialize TPM (KEEP THIS AT THE VERY BOTTOM)
run '~/.tmux/plugins/tpm/tpm'

